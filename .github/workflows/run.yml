name: Telegram Bot

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # 不再需要 ddddocr，即使安装失败也不影响（因为我们用超级鹰）
          pip install ddddocr || echo "ddddocr 安装失败，忽略"
      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ZWFW_TOKEN: ${{ secrets.ZWFW_TOKEN }}
          CNA: ${{ secrets.CNA }}
          JSESSIONID: ${{ secrets.JSESSIONID }}
          SESSION: ${{ secrets.SESSION }}
          SERVERID: ${{ secrets.SERVERID }}
          OKPAY_ID: ${{ secrets.OKPAY_ID }}
          OKPAY_TOKEN: ${{ secrets.OKPAY_TOKEN }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
        run: |
          python bot.py
