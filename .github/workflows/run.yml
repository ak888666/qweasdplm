name: Telegram Bot

on:
  # 定时触发：每5小时运行一次（避免6小时硬限制）
  schedule:
    - cron: '0 */5 * * *'
  # 允许手动触发
  workflow_dispatch:
  # 推送代码时触发（用于测试）
  push:
    branches: [ "main" ]

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5小时50分钟，低于6小时硬限制
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ZWFW_TOKEN: ${{ secrets.ZWFW_TOKEN }}
          CNA: ${{ secrets.CNA }}
          JSESSIONID: ${{ secrets.JSESSIONID }}
          SESSION: ${{ secrets.SESSION }}
          SERVERID: ${{ secrets.SERVERID }}
        run: |
          python bot.py
