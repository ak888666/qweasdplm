name: Telegram Bot

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: telegram-bot-run
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ----- 缓存 users.json（新版 key）-----
      - name: Cache users.json
        uses: actions/cache@v3
        with:
          path: users.json
          key: users-json-v2
          restore-keys: users-json-v2

      # ----- 确保文件存在且不为空 -----
      - name: Ensure users.json exists
        run: |
          if [ ! -f users.json ] || [ ! -s users.json ]; then
            echo '{}' > users.json
            echo "📄 已创建空的 users.json"
          else
            echo "✅ users.json 已存在，内容如下："
            cat users.json
          fi

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt --timeout 1000

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ZWFW_TOKEN: ${{ secrets.ZWFW_TOKEN }}
          CNA: ${{ secrets.CNA }}
          JSESSIONID: ${{ secrets.JSESSIONID }}
          SESSION: ${{ secrets.SESSION }}
          SERVERID: ${{ secrets.SERVERID }}
          OKPAY_ID: ${{ secrets.OKPAY_ID }}
          OKPAY_TOKEN: ${{ secrets.OKPAY_TOKEN }}
          CALLBACK_URL: ${{ secrets.CALLBACK_URL }}
          MONGO_URI: ${{ secrets.MONGO_URI }}   # 如果有就加，没有也没关系
        run: |
          python bot.py
