name: Telegram Bot (6h Cycle)

on:
  # 1. 每 5 小时触发一次（避开 6 小时极限，留出缓冲）
  schedule:
    - cron: '0 */5 * * *'
  # 2. 允许手动点击运行
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 设置超时为 350 分钟（约 5.8 小时），低于 360 分钟限制

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ZWFW_TOKEN: ${{ secrets.ZWFW_TOKEN }}
          CNA: ${{ secrets.CNA }}
          JSESSIONID: ${{ secrets.JSESSIONID }}
          SESSION: ${{ secrets.SESSION }}
          SERVERID: ${{ secrets.SERVERID }}
          # 其他敏感参数都放 Secrets 里
        run: |
          python bot.py
