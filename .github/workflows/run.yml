name: 查询身份证信息

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests urllib3

      - name: 运行查询
        env:
          COOKIE_CNA: ${{ secrets.COOKIE_CNA }}
          COOKIE_JSESSIONID: ${{ secrets.COOKIE_JSESSIONID }}
          COOKIE_SESSION: ${{ secrets.COOKIE_SESSION }}
          COOKIE_SERVERID: ${{ secrets.COOKIE_SERVERID }}
          ZWFW_TOKEN: ${{ secrets.ZWFW_TOKEN }}
          ID_CARD: ${{ secrets.ID_CARD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python query.py 2>&1 | tee output.log
          exit ${PIPESTATUS[0]}

      - name: 上传诊断日志（无论成功失败）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-logs
          path: |
            output.log
            output/
